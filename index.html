<style>

:root{
--gold:#dfb76c;
--gold-light:#f0d08d;
--black:#050505;
--dark:#121212;
--gray:#1f1f1f;
--white:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Arial,sans-serif;
color:white;
overflow-x:hidden;

background:
linear-gradient(
135deg,
#2a2a2a 0%,
#1b1b1b 30%,
#080808 70%,
#000000 100%
);

background-size:400% 400%;
animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* NAVBAR */

nav{
position:fixed;
top:0;
left:0;
width:100%;

padding:16px 6%;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(0,0,0,.65);
backdrop-filter:blur(15px);

border-bottom:1px solid rgba(223,183,108,.15);

z-index:999;
}

.logo{
font-family:'Cinzel',serif;
letter-spacing:5px;
font-size:1.4rem;

animation:goldGlow 4s infinite;
}

nav a{
color:var(--gold);
text-decoration:none;

font-size:.85rem;
letter-spacing:1px;

transition:.3s;
}

nav a:hover{
color:white;
}

/* HERO */

header{
height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

padding:20px;

background:
linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.85)),
url('image_6.png');

background-size:cover;
background-position:center;
}

.hero-subtitle{
color:var(--gold);

letter-spacing:4px;
font-size:.8rem;

margin-bottom:15px;

animation:fadeUp 1s ease;
}

.hero-title{
font-family:'Playfair Display',serif;

font-size:clamp(2rem,5vw,4.5rem);

max-width:850px;

line-height:1.2;

animation:fadeUp 1.5s ease;
}

.hero-btn{
margin-top:30px;

padding:14px 30px;

border:1px solid var(--gold);

color:var(--gold);
text-decoration:none;

position:relative;
overflow:hidden;

transition:.4s;
}

.hero-btn:hover{
background:var(--gold);
color:black;
box-shadow:0 0 25px rgba(223,183,108,.5);
}

.hero-btn::before{
content:'';

position:absolute;
top:0;
left:-100%;

width:100%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.4),
transparent
);

transition:.7s;
}

.hero-btn:hover::before{
left:100%;
}

@keyframes goldGlow{
0%{
color:white;
}

50%{
color:var(--gold);
text-shadow:0 0 20px var(--gold);
}

100%{
color:white;
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:768px){

.logo{
font-size:1.1rem;
}

nav a{
font-size:.75rem;
}

.hero-title{
font-size:2rem;
}

.hero-subtitle{
font-size:.7rem;
}

}

</style>
<style>

/* SECTION SPACING */

section{
padding:90px 5%;
margin-top:20px;
}

/* TITLES */

.section-title{
font-family:'Cinzel',serif;
text-align:center;
letter-spacing:6px;
margin-bottom:50px;
color:#dfb76c;
font-size:clamp(1.4rem,3vw,2rem);
}

/* STORY */

.story{
position:relative;
}

.story-text{
max-width:800px;
margin:auto;
text-align:center;
line-height:2;
color:#c5c5c5;
font-size:1rem;
margin-bottom:50px;
}

/* FEATURES */

.features{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.feature-box{
padding:16px 22px;

background:rgba(255,255,255,.03);

backdrop-filter:blur(10px);

border:1px solid rgba(223,183,108,.15);

border-radius:12px;

transition:.4s ease;
}

.feature-box:hover{
transform:translateY(-8px);

border-color:#dfb76c;

box-shadow:
0 0 25px rgba(223,183,108,.15);
}

/* REVIEWS */

.reviews{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.review-card{

background:
linear-gradient(
145deg,
rgba(255,255,255,.03),
rgba(255,255,255,.01)
);

backdrop-filter:blur(12px);

border:1px solid rgba(223,183,108,.12);

padding:25px;

border-radius:16px;

transition:.4s ease;
}

.review-card:hover{

transform:translateY(-10px);

border-color:#dfb76c;

box-shadow:
0 0 30px rgba(223,183,108,.15);
}

.review-card p{
margin-top:12px;
color:#c4c4c4;
line-height:1.7;
}

/* MOBILE */

@media(max-width:768px){

section{
padding:70px 5%;
}

.section-title{
letter-spacing:3px;
font-size:1.3rem;
}

.story-text{
font-size:.92rem;
line-height:1.8;
}

.feature-box{
width:100%;
text-align:center;
}

}

</style>
<style>

/* PRODUCT GRID */

.product-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:25px;
max-width:1000px;
margin:auto;
}

/* THIRD PRODUCT CENTER */

.product-card:last-child{
grid-column:1/3;
max-width:450px;
margin:auto;
}

/* PRODUCT CARD */

.product-card{

background:
linear-gradient(
145deg,
rgba(255,255,255,.03),
rgba(255,255,255,.01)
);

backdrop-filter:blur(15px);

border:1px solid rgba(223,183,108,.12);

border-radius:18px;

overflow:hidden;

transition:.4s ease;
}

.product-card:hover{

transform:translateY(-10px);

border-color:#dfb76c;

box-shadow:
0 0 35px rgba(223,183,108,.18);
}

/* IMAGE */

.product-card img{

width:100%;
height:220px;

object-fit:contain;

padding:20px;

animation:floatBottle 4s ease-in-out infinite;
}

@keyframes floatBottle{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0);
}

}

/* CONTENT */

.product-content{
padding:20px;
text-align:center;
}

.product-content h3{

font-family:'Cinzel';

letter-spacing:3px;

margin-bottom:10px;
}

/* SHORT TEXT */

.product-content p{

color:#c5c5c5;

font-size:.92rem;

margin-bottom:15px;
}

/* HIDE NOTES */

.notes{
display:none;
}

/* PRICE */

.price{
margin-top:10px;
}

.old{
text-decoration:line-through;
color:#777;
font-size:.9rem;
}

.discount{

background:#dfb76c;

color:black;

padding:4px 8px;

font-size:.75rem;

font-weight:bold;

border-radius:20px;

margin-left:8px;
}

.new{
margin-top:10px;
color:#dfb76c;
}

/* BUTTON */

.buy-btn{

display:block;

margin-top:18px;

padding:14px;

border-radius:50px;

text-decoration:none;

border:1px solid #dfb76c;

color:#dfb76c;

position:relative;

overflow:hidden;

transition:.4s;
}

.buy-btn:hover{

background:#dfb76c;

color:black;

box-shadow:
0 0 25px rgba(223,183,108,.4);
}

/* MOBILE */

@media(max-width:768px){

.product-grid{
grid-template-columns:1fr;
}

.product-card:last-child{
grid-column:auto;
max-width:100%;
}

.product-card img{
height:180px;
}

}

</style>
<style>

/* ===============================
   GLOBAL SCROLL ANIMATIONS
================================ */

.fade-in{
opacity:0;
transform:translateY(30px);
transition:all 1s ease;
}

.fade-in.show{
opacity:1;
transform:translateY(0);
}

/* ===============================
   BUTTON SHINE EFFECT (GLOBAL)
================================ */

.buy-btn::before,
.hero-btn::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.25),
transparent
);
transition:.7s;
}

.buy-btn:hover::before,
.hero-btn:hover::before{
left:100%;
}

/* ===============================
   INSTAGRAM SECTION
================================ */

.instagram{
text-align:center;
}

.insta-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
max-width:900px;
margin:auto;
}

.insta-box{
height:180px;
background:rgba(255,255,255,.03);
border:1px solid rgba(223,183,108,.12);
border-radius:14px;
backdrop-filter:blur(10px);
transition:.4s ease;
animation:pulseGlow 3s infinite;
}

.insta-box:hover{
transform:scale(1.05);
border-color:#dfb76c;
box-shadow:0 0 25px rgba(223,183,108,.2);
}

@keyframes pulseGlow{
0%{box-shadow:0 0 10px rgba(223,183,108,.1);}
50%{box-shadow:0 0 20px rgba(223,183,108,.25);}
100%{box-shadow:0 0 10px rgba(223,183,108,.1);}
}

/* ===============================
   FOOTER
================================ */

footer{
text-align:center;
padding:50px 20px;
border-top:1px solid rgba(223,183,108,.1);
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
}

footer h3{
font-family:'Cinzel',serif;
color:#dfb76c;
letter-spacing:4px;
margin-bottom:10px;
}

footer p{
color:#aaa;
font-size:.9rem;
}

/* ===============================
   SCROLLBAR (LUXURY TOUCH)
================================ */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-track{
background:#0a0a0a;
}

::-webkit-scrollbar-thumb{
background:#dfb76c;
border-radius:10px;
}

/* ===============================
   RESPONSIVE INSTAGRAM
================================ */

@media(max-width:768px){

.insta-grid{
grid-template-columns:1fr;
}

}

</style>
