<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KHAMEZ | Luxury Fragrances</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--gold-light:#f5d98f;
--black:#000;
--dark:#050505;
--gray:#111;
--white:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:'Cormorant Garamond',serif;
overflow-x:hidden;
scroll-behavior:smooth;
}

section{
padding:90px 20px;
}
  nav{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,.95);
backdrop-filter:blur(15px);
display:flex;
flex-direction:column;
align-items:center;
padding:10px;
z-index:999;
border-bottom:1px solid rgba(212,175,55,.15);
}

.nav-top{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
margin-bottom:8px;
}

.brand-logo{
width:220px;
height:auto;
display:block;
}

.logo-text{
color:var(--gold);
font-family:'Cinzel',serif;
letter-spacing:3px;
font-size:0.9rem;
margin-top:5px;
}

.nav-links{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.nav-links a{
text-decoration:none;
color:var(--gold);
border:1px solid rgba(212175,55,.25);
padding:7px 14px;
font-size:.7rem;
letter-spacing:2px;
transition:.3s;
}

.nav-links a:hover{
background:var(--gold);
color:black;
}
  header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;

/* NEW BACKGROUND IMAGE */
background:
linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.92)),
url("image_6.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.hero-subtitle{
color:var(--gold);
letter-spacing:5px;
font-size:.8rem;
margin-bottom:20px;
}

.hero-title{
font-family:'Playfair Display',serif;
font-size:2.2rem;
line-height:1.3;
max-width:350px;
}

.hero-btn{
margin-top:35px;
padding:14px 25px;
border:1px solid var(--gold);
text-decoration:none;
color:var(--gold);
letter-spacing:2px;
transition:.4s;
}

.hero-btn:hover{
background:var(--gold);
color:black;
}
  .section-title{
text-align:center;
font-family:'Cinzel',serif;
letter-spacing:5px;
color:var(--gold);
margin-bottom:50px;
font-size:1.3rem;
}

.feature-box{
border:1px solid #222;
padding:16px 20px;
background:#0c0c0c;
border-radius:10px;
color:#d0d0d0;
letter-spacing:1px;
transition:.4s;
}

.feature-box:hover{
transform:translateY(-5px);
border-color:var(--gold);
color:var(--gold);
}
  .review-grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

.review-card{
background:#0c0c0c;
border:1px solid #222;
padding:25px;
border-radius:12px;
transition:.4s;
text-align:center;
}

.review-card:hover{
transform:translateY(-5px);
border-color:var(--gold);
}

.review-card p{
margin-top:12px;
color:#bdbdbd;
line-height:1.8;
font-size:1rem;
}
  .product-grid{
display:grid;
grid-template-columns:repeat(2, 1fr);
gap:15px;
}

.product-card{
background:#0c0c0c;
border:1px solid #222;
border-radius:12px;
overflow:hidden;
transition:.4s;
}

.product-card:hover{
border-color:var(--gold);
transform:translateY(-6px);
}

.product-card img{
width:100%;
height:130px;
object-fit:contain;
padding:10px;
background:#080808;
}

.product-content{
padding:12px;
text-align:center;
}

.product-content h3{
font-family:'Cinzel',serif;
font-size:1rem;
letter-spacing:2px;
white-space:nowrap;
}

.product-content p{
font-size:.75rem;
color:#bdbdbd;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
margin:8px 0;
}

.price{
color:var(--gold);
margin-bottom:10px;
}

.buy-btn{
display:block;
padding:10px;
text-decoration:none;
border:1px solid var(--gold);
color:var(--gold);
font-size:.75rem;
letter-spacing:1px;
transition:.3s;
}

.buy-btn:hover{
background:var(--gold);
color:black;
}
  .insta-link{
color:#d4af37;
text-decoration:none;
font-size:1.1rem;
letter-spacing:2px;
}

.footer{
text-align:center;
padding:50px 20px;
border-top:1px solid #222;
color:#777;
margin-top:60px;
}

.whatsapp{
position:fixed;
right:15px;
bottom:15px;
background:#25D366;
color:white;
text-decoration:none;
padding:12px 18px;
border-radius:40px;
font-weight:bold;
font-size:.85rem;
z-index:999;
}

/* SCROLL ANIMATION */
section,
.product-card,
.review-card,
.feature-box{
opacity:0;
transform:translateY(30px);
transition:1s;
}

.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<nav>
  <div class="nav-top">
    <img src="image_7.png" class="brand-logo">
    <div class="logo-text">KHAMEZ</div>
  </div>

  <div class="nav-links">
    <a href="#">HOME</a>
    <a href="#products">COLLECTION</a>
    <a href="#footer">CONTACT</a>
  </div>
</nav>

<header>
  <div class="hero-subtitle">
    MAISON DE PARFUM EST. MMXXV
  </div>

  <h1 class="hero-title">
    Luxury Fragrance For The Bold And Unforgettable
  </h1>

  <a href="#products" class="hero-btn">
    EXPLORE COLLECTION
  </a>
</header>

<!-- YOUR OTHER SECTIONS REMAIN SAME (story, reviews, products, footer) -->

<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

document.querySelectorAll(
'section,.product-card,.review-card,.feature-box'
).forEach(el => {
  observer.observe(el);
});
</script>

</body>
</html>
