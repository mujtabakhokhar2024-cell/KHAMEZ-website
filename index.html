<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KHAMEZ | Luxury Fragrances</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --bg-color: #060606;
            --card-bg: #111111;
            --accent-gold: #dfb76c;
            --text-main: #ffffff;
            --text-muted: #999999;
            --border-color: #222222;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        /* Premium Leather Background Header Layer */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Using your high-end textured background from image_4.png */
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), rgba(6, 6, 6, 1)), url('image_4.png');
            background-size: cover;
            background-position: center;
            padding: 0 20px;
            position: relative;
        }

        /* Elegantly sized centered logo presentation */
        .hero-logo {
            max-width: clamp(200px, 40vw, 350px);
            height: auto;
            margin-bottom: 25px;
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.8));
            animation: fadeInDown 1.5s cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        header p {
            color: #e5e5e5;
            max-width: 600px;
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0 0 45px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
            animation: fadeIn 2.5s ease-in-out;
        }

        /* Luxury Button Interaction */
        .btn {
            padding: 16px 45px;
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(0, 0, 0, 0.6);
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 600;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: var(--accent-gold);
            color: #000000;
            box-shadow: 0 0 30px rgba(223, 183, 108, 0.4);
            transform: translateY(-2px);
        }

        /* Products Presentation Grid */
        section {
            padding: 120px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            color: var(--accent-gold);
            font-size: clamp(2.2rem, 4vw, 3rem);
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 80px;
            text-align: center;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 50px;
        }

        /* Ultra-Premium Card Frame */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .card:hover {
            transform: translateY(-12px);
            border-color: var(--accent-gold);
        }

        /* Customized mood ambient lighting reflections on hover matching watermarked_img_5187771057806093530.png */
        .card.smoke-card:hover { box-shadow: 0 20px 45px rgba(255, 255, 255, 0.03); }
        .card.secret-card:hover { box-shadow: 0 20px 45px rgba(223, 183, 108, 0.08); }
        .card.eternity-card:hover { box-shadow: 0 20px 45px rgba(28, 77, 147, 0.15); }

        /* Product Image Presentation Container */
        .image-wrapper {
            width: 100%;
            height: 440px;
            background: #0d0d0d;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid var(--border-color);
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .card:hover .image-wrapper img {
            transform: scale(1.03);
        }

        /* Card Text and Typography Content */
        .card-content {
            padding: 35px 30px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
            background: linear-gradient(to bottom, #111111, #080808);
            text-align: center;
        }

        .card h3 {
            font-size: 1.65rem;
            font-weight: 400;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .card p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.95rem;
            margin: 0 0 15px 0;
            letter-spacing: 0.5px;
        }

        .price {
            color: var(--accent-gold);
            font-weight: 500;
            font-size: 1.35rem;
            display: block;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Luxury Call to Action Box Layout */
        .buy {
            display: block;
            text-align: center;
            padding: 16px;
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 3px;
            transition: all 0.4s ease;
        }

        .card:hover .buy {
            background: var(--accent-gold);
            color: #000000;
            border-color: var(--accent-gold);
            box-shadow: 0 4px 15px rgba(223, 183, 108, 0.2);
        }

        .buy:hover {
            background: #ffffff !important;
            color: #000000 !important;
            box-shadow: 0 4px 20px rgba(255,255,255,0.2) !important;
        }

        /* Premium Minimalist Footer Framework */
        footer {
            padding: 100px 20px;
            text-align: center;
            border-top: 1px solid var(--border-color);
            background: #030303;
        }

        .footer-story {
            color: #e5e5e5;
            font-size: 1.15rem;
            font-weight: 200;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .footer-social {
            color: #666666;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-social:hover {
            color: var(--accent-gold);
        }

        /* Fluid Presentation Animation Framework */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>

    <!-- Hero Showcase Header Box using image_4.png -->
    <header>
        <img src="image_4.png" alt="KHAMEZ Logo Graphic" class="hero-logo">
        <p>Unveil Your Darkness</p>
        <button class="btn" onclick="document.getElementById('products').scrollIntoView()">Explore Collection</button>
    </header>

    <!-- Main Dynamic Collection Catalog Section -->
    <section id="products">
        <h2 class="section-title">Our Collection</h2>

        <div class="products">

            <!-- Card 1: Smoke (Image Reference: image.png) -->
            <div class="card smoke-card">
                <div class="image-wrapper">
                    <img src="image.png" alt="Smoke By KHAMEZ">
                </div>
                <div class="card-content">
                    <div>
                        <h3>Smoke By KHAMEZ</h3>
                        <p>Woody, manly impression</p>
                        <span class="price">PKR 2,499</span>
                    </div>
                    <a class="buy" href="https://wa.me/923224153466?text=I%20want%20to%20buy%20Smoke%20perfume" target="_blank">Buy Now</a>
                </div>
            </div>

            <!-- Card 2: Secret (Image Reference: image_3.png) -->
            <div class="card secret-card">
                <div class="image-wrapper">
                    <img src="image_3.png" alt="Secret By KHAMEZ">
                </div>
                <div class="card-content">
                    <div>
                        <h3>Secret By KHAMEZ</h3>
                        <p>Soft floral impression</p>
                        <span class="price">PKR 2,499</span>
                    </div>
                    <a class="buy" href="https://wa.me/923224153466?text=I%20want%20to%20buy%20Secret%20perfume" target="_blank">Buy Now</a>
                </div>
            </div>

            <!-- Card 3: Eternity (Image Reference: image_2.png) -->
            <div class="card eternity-card">
                <div class="image-wrapper">
                    <img src="image_2.png" alt="Eternity By KHAMEZ">
                </div>
                <div class="card-content">
                    <div>
                        <h3>Eternity By KHAMEZ</h3>
                        <p>Long-lasting refreshing scent</p>
                        <span class="price">PKR 2,999</span>
                    </div>
                    <a class="buy" href="https://wa.me/923224153466?text=I%20want%20to%20buy%20Eternity%20perfume" target="_blank">Buy Now</a>
                </div>
            </div>

        </div>
    </section>

    <!-- Brand Footer Platform -->
    <footer>
        <p class="footer-story">Luxury. Darkness. Identity.</p>
        <a href="https://instagram.com/khamez_house" target="_blank" class="footer-social">Follow us: @khamez_house</a>
    </footer>

</body>
</html>
