<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KHAMEZ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #0b0b0b;
color: white;
scroll-behavior: smooth;
}

header {
height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
background: radial-gradient(circle, #1a1a1a, #000);
}

h1 {
font-size: 60px;
letter-spacing: 8px;
color: gold;
animation: fadeIn 2s ease-in-out;
}

p {
color: #ccc;
max-width: 500px;
}

.btn {
margin-top: 20px;
padding: 12px 25px;
border: 1px solid gold;
color: gold;
background: transparent;
cursor: pointer;
transition: 0.3s;
}

.btn:hover {
background: gold;
color: black;
}

section {
padding: 80px 20px;
text-align: center;
}

.products {
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 20px;
}

.card {
background: #111;
padding: 20px;
width: 250px;
border: 1px solid #222;
transition: 0.3s;
}

.card:hover {
transform: scale(1.05);
border-color: gold;
}

.buy {
display: inline-block;
margin-top: 10px;
padding: 10px;
background: gold;
color: black;
text-decoration: none;
font-weight: bold;
}

footer {
padding: 40px;
text-align: center;
color: #777;
}

@keyframes fadeIn {
from {opacity: 0;}
to {opacity: 1;}
}
</style>
</head>

<body>

<header>
<h1>KHAMEZ</h1>
<p>Unveil your darkness with KHAMEZ</p>
<button class="btn" onclick="document.getElementById('products').scrollIntoView()">Explore</button>
</header>

<section id="products">
<h2 style="color:gold;">Our Collection</h2>

<div class="products">

<div class="card">
<h3>Smoke</h3>
<p>PKR 2499<br>Woody, manly impression</p>
<a class="buy"
href="https://wa.me/923224153466?text=I%20want%20to%20buy%20Smoke%20perfume"
target="_blank">Buy Now</a>
</div>

<div class="card">
<h3>Secret</h3>
<p>PKR 2499<br>Soft floral impression</p>
<a class="buy"
href="https://wa.me/923224153466?text=I%20want%20to%20buy%20Secret%20perfume"
target="_blank">Buy Now</a>
</div>

<div class="card">
<h3>Iternity</h3>
<p>PKR 2999<br>Long-lasting refreshing scent</p>
<a class="buy"
href="https://wa.me/923224153466?text=I%20want%20to%20buy%20Iternity%20perfume"
target="_blank">Buy Now</a>
</div>

</div>
</section>

<footer>
<p>Our Story: Luxury. Darkness. Identity.</p>
<p>Follow us: @khamez_house</p>
</footer>

</body>
</html>
